services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: irsal_notes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/irsal_notes?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@db:5432/irsal_notes?schema=public"
      JWT_SECRET: "replace-with-a-secure-random-string"
      PORT: 3001
      FRONTEND_URL: "http://localhost:3000"
    ports:
      - "3001:3001"
    depends_on:
      - db
    command: >
      sh -c "npx prisma migrate deploy && node dist/src/main"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:3001"
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
      INTERNAL_API_URL: "http://api:3001"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
